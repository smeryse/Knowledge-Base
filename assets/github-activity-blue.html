<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Activity - Blue</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    h4 {
      margin: 0 0 16px 0;
      color: #c9d1d9;
      font-size: 16px;
      font-weight: 600;
    }

    .activity-graph {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      overflow-x: auto;
      padding: 8px 0;
    }

    .weekdays {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .weekday {
      height: 10px;
      font-size: 9px;
      color: #8b949e;
      line-height: 10px;
    }

    .weeks {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .week {
      display: grid;
      grid-template-rows: repeat(7, 1fr);
      gap: 3px;
    }

    .day {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .day:hover {
      transform: scale(1.2);
    }

    /* Синяя палитра */
    .level-0 { background: #0d1117; }
    .level-1 { background: #0a3d8a; }
    .level-2 { background: #1a5fbf; }
    .level-3 { background: #2a7fef; }
    .level-4 { background: #3a9eff; }
    .level-5 { background: #5ab0ff; }

    .legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      font-size: 11px;
      color: #8b949e;
    }

    .legend-color {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    /* Скроллбар */
    .activity-graph::-webkit-scrollbar {
      height: 8px;
    }

    .activity-graph::-webkit-scrollbar-track {
      background: #0d1117;
      border-radius: 4px;
    }

    .activity-graph::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .activity-graph::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }
  </style>
</head>
<body>
  <div class="container">
    <h4>Активность</h4>
    
    <div class="activity-graph">
      <!-- Дни недели -->
      <div class="weekdays">
        <div class="weekday">Пн</div>
        <div class="weekday">Ср</div>
        <div class="weekday">Пт</div>
      </div>
      
      <!-- Недели -->
      <div class="weeks" id="weeks"></div>
    </div>
    
    <!-- Легенда -->
    <div class="legend">
      <span>Меньше</span>
      <div class="legend-color level-0"></div>
      <div class="legend-color level-1"></div>
      <div class="legend-color level-2"></div>
      <div class="legend-color level-3"></div>
      <div class="legend-color level-4"></div>
      <div class="legend-color level-5"></div>
      <span>Больше</span>
    </div>
  </div>

  <script>
    // Генерация данных активности (случайные для демонстрации)
    const daysToShow = 365;
    const today = new Date();
    const activity = [];

    for (let i = daysToShow - 1; i >= 0; i--) {
      const date = new Date(today);
      date.setDate(date.getDate() - i);
      const count = Math.floor(Math.random() * 30);
      activity.push({ date, count });
    }

    // Группировка по неделям
    const weeks = {};
    for (let i = 0; i < activity.length; i++) {
      const weekNum = Math.floor(i / 7);
      const dayInWeek = i % 7;
      if (!weeks[weekNum]) weeks[weekNum] = [];
      weeks[weekNum][dayInWeek] = activity[i];
    }

    // Определение максимального значения для цветовой шкалы
    const maxCount = Math.max(...activity.map(d => d.count), 1);

    // Функция получения уровня активности
    function getLevel(count) {
      if (count === 0) return 0;
      const ratio = count / maxCount;
      if (ratio > 0.8) return 5;
      if (ratio > 0.6) return 4;
      if (ratio > 0.4) return 3;
      if (ratio > 0.2) return 2;
      return 1;
    }

    // Рендеринг недель
    const weeksContainer = document.getElementById('weeks');
    
    Object.keys(weeks).forEach(weekNum => {
      const week = document.createElement('div');
      week.className = 'week';
      
      for (let day = 0; day < 7; day++) {
        const dayData = weeks[weekNum][day];
        const dayEl = document.createElement('div');
        dayEl.className = `day level-${getLevel(dayData?.count || 0)}`;
        
        const dateStr = dayData?.date.toLocaleDateString('ru-RU', {
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        });
        
        dayEl.title = `${dateStr}: ${dayData?.count || 0}`;
        week.appendChild(dayEl);
      }
      
      weeksContainer.appendChild(week);
    });
  </script>
</body>
</html>
